<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Tsbbazar - Best Online Shopping Store</title>

    <meta name="description" content="Shop the latest fashion, electronics, beauty, home goods & more at unbeatable prices. ✓ Free shipping ✓ Easy returns ✓ Secure payment" />
    <meta name="keywords" content="online shopping, e-commerce, buy online, cheap prices, fashion, electronics, free shipping, deals, discounts" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet" />

    <meta property="og:title" content="Tsbbazar - Best Online Shopping Store" />
    <meta

    <script type="application/ld+json">

            "@id": "https://tsbbazar.com/#organization",

            "@type": "WebSite",
            "@id": "https://tsbbazar.com/#website",
            "url": "https://tsbbazar.com/",
            "name": "Tsbbazar",
            "potentialAction": {
              "@type": "SearchAction",
              "target": "https://tsbbazar.com/search?q={search_term_string}",
              "query-input": "required name=search_term_string"
            }
          }
        ]
      }
